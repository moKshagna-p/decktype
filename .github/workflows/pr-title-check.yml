name: "PR Title Check"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: write

jobs:
  main:
    name: check
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    steps:
      - name: Lint and verify PR title
        uses: amannn/action-semantic-pull-request@2d952a119666398e774059ba358bb2d2ee72c573 # v5.5.3
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            impr
            fix
            perf
            refactor
            revert
            style
            test
          requireScope: false
          # Subject must be at least one character
          subjectPattern: ^.+$

      - uses: marocchino/sticky-pull-request-comment@efaaab9297ca232d061732c0c145511500219752 # v2.9.0
        # When the previous steps fails, the workflow would stop. By adding this
        # condition you can continue the execution with the populated error message.
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            Hey there and thank you for opening this pull request! 👋🏼

            We require pull request titles to follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/). It looks like your proposed title needs to be adjusted.

            Details:

            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```
            A correct version would look something like: 

            feat(command line): add new feature
            impr(quotes): add english quotes
            fix(leaderboard): show user rank correctly

      # Delete a previous comment when the issue has been resolved
      - if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@efaaab9297ca232d061732c0c145511500219752 # v2.9.0
        with:
          header: pr-title-lint-error
          delete: true
